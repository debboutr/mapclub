<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MapClub</title>
</head>
<style>
img {
  max-width:25%;
}
/* Add a black background color to the top navigation */
.topnav {
  background-color: #333;
  overflow: hidden;
}

/* Style the links inside the navigation bar */
.topnav a {
  float: left;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

/* Change the color of links on hover */
.topnav a:hover {
  background-color: #ddd;
  color: black;
}

/* Add a color to the active/current link */
.topnav a.active {
  background-color: #04AA6D;
  color: white;
}
.floatr {
  float: right;
  font-size: 17px;
  margin-right: 24px;
}
</style>
<body>
    <div class="topnav">
      <a href="/">Home</a>
      <a href="./dev.html">News</a>
      <a class="active" href="./dev.html">Contact</a>
      <a href="./dev.html">About</a>
      <h2 class="floatr" style="color:white">Welcome to Mapclub!</h2>
    </div>
    <div class="container">
        <h1>Section currently under development! Come back soon</h1>
    </div>
</body>
</html>
